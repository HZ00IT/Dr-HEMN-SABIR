<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacients List Manager</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-tasks"></i> Pacients List Manager</h1>
            <p class="subtitle">Doctor HEMN SABIR SHWANI'S Pacients List .</p>
        </header>

        <div class="main-content">
            <!-- Add Todo Form -->
            <div class="add-todo-section">
                <h2>Add New Pacient</h2>
                <form id="todoForm" class="todo-form">
                    <div class="form-group">
                        <input type="text" id="todoTitle" placeholder="Enter task title..." required>
                    </div>
                    <div class="form-group">
                        <textarea id="todoDescription" placeholder="Enter task description (optional)"></textarea>
                    </div>
                    <div class="form-group">
                        <select id="todoPriority">
                            <option value="low">Low Priority</option>
                            <option value="medium" selected>Medium Priority</option>
                            <option value="high">High Priority</option>
                        </select>
                    </div>
                    <div class="form-buttons">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-plus"></i> Add Task
                        </button>
                        <button type="button" id="cancelEdit" class="btn btn-secondary" style="display: none;">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                </form>
            </div>

            <!-- Todo List -->
            <div class="todo-list-section">
                <div class="list-header">
                    <h2>Your Pacients</h2>
                    <div class="filters">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="pending">Pending</button>
                        <button class="filter-btn" data-filter="completed">Completed</button>
                    </div>
                </div>
                <div id="todoList" class="todo-list">
                    <!-- Todos will be dynamically added here -->
                </div>
            </div>

            <!-- Statistics -->
            <div class="stats-section">
                <h3>Statistics</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-list"></i>
                        <span id="totalTasks">0</span>
                        <p>Total Pacients</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-clock"></i>
                        <span id="pendingTasks">0</span>
                        <p>Pending</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-check-circle"></i>
                        <span id="completedTasks">0</span>
                        <p>Completed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
